name: Pull-Request CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: "test-key"
      GCP_PROJECT_ID: "test-project"
      PINECONE_NAMESPACE: "test-ns"
      PINECONE_INDEX_NAME: "test-idx"
      PINECONE_API_KEY: "test-key"
      MASTER_API_KEY: "test-master-key"
      INTERNAL_API_KEY: "test-internal-key"
      ALPHA_VANTAGE_API_KEY: "test"
      OPENWEATHERMAP_API_KEY: "test"
      NEWS_API_KEY: "test"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        run: pytest -v tests/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build Docker image
        run: docker build -t gemini-playground:ci .
      - name: Start container
        run: |
          docker run -d --name app \
            -p 8000:8000 \
            -e GEMINI_API_KEY=test-key \
            -e MASTER_API_KEY=test-master-key \
            -e GCP_PROJECT_ID=test-project \
            -e PINECONE_NAMESPACE=test-ns \
            -e PINECONE_INDEX_NAME=test-idx \
            -e PINECONE_API_KEY=test-key \
            -e ALPHA_VANTAGE_API_KEY=test \
            -e OPENWEATHERMAP_API_KEY=test \
            -e NEWS_API_KEY=test \
            gemini-playground:ci
